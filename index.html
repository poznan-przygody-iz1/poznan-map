<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Poznań - Miasto Przygód</title>
  
  <link rel="icon" type="image/png" href="favicon.png" />

  <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css?v=final-buttons" />
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-inner">
      
      <div class="header-titles">
        <div class="header-logo">
          <span class="logo-poz">POZ</span><span class="logo-nan">NAN</span>
        </div>
        <p class="header-tagline">Miasto Przygód</p>
      </div>

      <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

    </div>
  </header>

  <!-- ── SIDEBAR MENU ───────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Kategorie</h2>
      <button class="sidebar-close" id="sidebar-close" aria-label="Zamknij">&times;</button>
    </div>
    
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="Szukaj miejsca (np. Ratusz)..." autocomplete="off" />
      <div id="search-results" class="search-results"></div>
    </div>
    
    <div class="sidebar-content" id="sidebar-categories">
      </div>
  </aside>

  <!-- ── MAP CONTAINER ──────────────────────────────────── -->
  <div id="map"></div>

  <!-- ── MODAL OVERLAY ──────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-panel" id="modal-panel">
      <button class="modal-close" id="modal-close" aria-label="Zamknij">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <line x1="1" y1="1" x2="17" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="17" y1="1" x2="1" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Gallery -->
      <div class="modal-gallery">
        <div class="swiper modal-swiper">
          <div class="swiper-wrapper" id="swiper-wrapper"></div>
          <div class="swiper-pagination"></div>
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>
        <div class="modal-gallery-counter">
          <span id="gallery-current">1</span> / <span id="gallery-total">1</span>
        </div>
      </div>

      <!-- Content -->
      <div class="modal-content">
        <div class="modal-meta">
          <span class="modal-category" id="modal-category"></span>
        </div>
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-divider"></div>
        <p class="modal-description" id="modal-description"></p>
        <div class="modal-coords" id="modal-coords"></div>
      </div>
    </div>
  </div>

  <!-- ── LOADING SCREEN ─────────────────────────────────── -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-inner">
      <div class="loading-logo">
        <span class="logo-poz">POZ</span><span class="logo-nan">NAN</span>
      </div>
      <div class="loading-bar"><div class="loading-bar-fill"></div></div>
      <p class="loading-text">Ładowanie mapy…</p>
    </div>
  </div>

  <!-- ── SCRIPTS ────────────────────────────────────────── -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="script.js?v=2"></script>
</body>
</html>
